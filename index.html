<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✨ Um Segredinho pra Você ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffe0ec 0%, #ffd6e7 30%, #ffb3d1 60%, #ff8fab 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* ---- Corações flutuantes de fundo ---- */
    .hearts-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .heart-float {
      position: absolute;
      bottom: -60px;
      font-size: 1.4rem;
      animation: floatUp linear infinite;
      opacity: 0;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(-10deg) scale(0.8); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(-110vh) rotate(15deg) scale(1.2); opacity: 0; }
    }

    /* ---- Cartão principal ---- */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.70);
      backdrop-filter: blur(18px);
      border: 2px solid rgba(255, 140, 175, 0.45);
      border-radius: 30px;
      padding: 48px 44px 44px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow:
        0 8px 32px rgba(255, 100, 150, 0.25),
        0 2px 8px rgba(255, 100, 150, 0.12),
        inset 0 1px 0 rgba(255,255,255,0.8);
      animation: cardIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0)   scale(1);   }
    }

    /* ícone de cadeado coração */
    .lock-icon {
      font-size: 4rem;
      display: block;
      margin-bottom: 8px;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1);    }
      50%       { transform: scale(1.12); }
    }

    .card h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 2rem;
      color: #c2185b;
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .card p.sub {
      font-size: 0.88rem;
      color: #ad1457;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    /* ---- Input de senha ---- */
    .input-wrap {
      position: relative;
      margin-bottom: 18px;
    }

    .input-wrap input {
      width: 100%;
      padding: 14px 52px 14px 20px;
      border: 2px solid #f48fb1;
      border-radius: 50px;
      background: rgba(255,255,255,0.85);
      font-size: 1.05rem;
      font-family: 'Nunito', sans-serif;
      color: #880e4f;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      text-align: center;
      letter-spacing: 2px;
    }

    .input-wrap input::placeholder {
      letter-spacing: 0.5px;
      color: #f48fb1;
    }

    .input-wrap input:focus {
      border-color: #e91e8c;
      box-shadow: 0 0 0 4px rgba(233, 30, 140, 0.14);
    }


    /* ---- Botão ---- */
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #f06292, #e91e8c);
      color: #fff;
      font-family: 'Dancing Script', cursive;
      font-size: 1.35rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 18px rgba(233, 30, 140, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      transform: translate(-50%,-50%);
      transition: width 0.4s, height 0.4s, opacity 0.4s;
      opacity: 0;
    }

    .btn:active::after {
      width: 220px; height: 220px;
      opacity: 0;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 24px rgba(233, 30, 140, 0.5);
    }

    .btn:active { transform: translateY(0); }

    /* ---- Mensagem de erro ---- */
    .msg-error {
      margin-top: 14px;
      font-size: 0.88rem;
      color: #c62828;
      background: rgba(255, 200, 200, 0.55);
      border-radius: 20px;
      padding: 8px 16px;
      display: none;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-7px); }
      40%      { transform: translateX(7px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }

    .msg-error.show { display: block; }

    /* ---- Tela de revelação ---- */
    #reveal {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      animation: cardIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    #reveal h2 {
      font-family: 'Dancing Script', cursive;
      font-size: 2.2rem;
      color: #c2185b;
      line-height: 1.2;
    }

    #reveal p {
      font-size: 0.92rem;
      color: #ad1457;
    }

    #reveal img {
      width: 100%;
      max-width: 340px;
      border-radius: 20px;
      border: 3px solid rgba(255,140,175,0.6);
      box-shadow: 0 8px 30px rgba(255,100,150,0.35);
      transition: transform 0.3s;
    }

    #reveal img:hover { transform: scale(1.03); }

    /* ---- Confetes ---- */
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -20px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
      z-index: 999;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Corações flutuando ao fundo -->
  <div class="hearts-bg" id="heartsBg"></div>

  <!-- Cartão de senha -->
  <div class="card" id="card">
    <span class="lock-icon">🔐</span>
    <h1>Tem um segredinho<br>pra você 💕</h1>
    <p class="sub">Só quem é especial consegue abrir...</p>

    <div class="input-wrap">
      <input
        type="text"
        id="passwordInput"
        placeholder="Digite a senha com amor"
        maxlength="40"
        autocomplete="off"
        onkeydown="if(event.key==='Enter') verificar()"
      />
    </div>

    <button class="btn" onclick="verificar()">Abrir com o coração 💖</button>

    <div class="msg-error" id="msgError">
      Essa não é a senha certa, meu bem... tente de novo 🥺
    </div>
  </div>

  <!-- Revelação da imagem -->
  <div class="card" id="reveal" style="display:none;">
    <span style="font-size:3.5rem; animation: pulse 1.8s ease-in-out infinite; display:block;">💝</span>
    <h2>Você acertou!<br>É você mesmo 🥰</h2>
    <p>Guardei essa surpresinha só pra você...</p>
    <img src="imagens/Imagem1.jpeg" alt="Surpresa especial" id="imgSurpresa" />
    <p style="margin-top:4px; font-size:0.82rem; color:#e91e8c;">
      Obrigado por ser tão especial 💗
    </p>
  </div>

  <script>
    // ─── CONFIGURAÇÃO ───────────────────────────────────────────
    const SENHAS_CORRETAS = ["não precisava", "não precisava vey", "não precisava vei"];
    // ────────────────────────────────────────────────────────────

    // Gera corações flutuantes de fundo
    const emojis = ["🩷","💗","💓","💕","💖","🌸","✨","🌷","💝","🫶"];
    const bg = document.getElementById("heartsBg");
    for (let i = 0; i < 22; i++) {
      const h = document.createElement("span");
      h.className = "heart-float";
      h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      h.style.left = Math.random() * 100 + "%";
      h.style.fontSize = (0.9 + Math.random() * 1.6) + "rem";
      h.style.animationDuration = (6 + Math.random() * 10) + "s";
      h.style.animationDelay   = (Math.random() * 12) + "s";
      bg.appendChild(h);
    }

    // Verifica a senha
    function verificar() {
      const valor = document.getElementById("passwordInput").value.trim().toLowerCase();
      const erro  = document.getElementById("msgError");

      if (SENHAS_CORRETAS.some(s => s.toLowerCase() === valor)) {
        // Esconde o card de senha
        document.getElementById("card").style.display = "none";
        // Mostra revelação
        const rev = document.getElementById("reveal");
        rev.style.display = "flex";
        // Dispara confetes
        launchConfetti();
      } else {
        erro.classList.remove("show");
        void erro.offsetWidth; // reinicia animação
        erro.classList.add("show");
        document.getElementById("passwordInput").value = "";
      }
    }

    // Confetes coloridos
    function launchConfetti() {
      const cores = ["#f48fb1","#e91e8c","#ff4081","#ff80ab","#ffd1e8","#fff176","#b2ff59","#80deea"];
      for (let i = 0; i < 90; i++) {
        setTimeout(() => {
          const c = document.createElement("div");
          c.className = "confetti-piece";
          c.style.left = Math.random() * 100 + "vw";
          c.style.background = cores[Math.floor(Math.random() * cores.length)];
          c.style.width  = (8 + Math.random() * 8) + "px";
          c.style.height = (8 + Math.random() * 8) + "px";
          c.style.animationDuration = (2.5 + Math.random() * 3) + "s";
          c.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
          document.body.appendChild(c);
          setTimeout(() => c.remove(), 6000);
        }, i * 30);
      }
    }
  </script>
</body>
</html>
